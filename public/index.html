<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOPODER.SHOP - Atacado e Dropshipping</title>
    <style>
        /* ESTILOS BÁSICOS (CSS EMBUTIDO PARA FACILITAR) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f4f4f4; color: #333; }
        
        /* CABEÇALHO */
        header { background-color: #111; padding: 20px; text-align: center; color: white; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo-container img { max-height: 50px; }
        .menu { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .menu a { color: white; text-decoration: none; font-weight: bold; cursor: pointer; padding: 5px 10px; border-radius: 5px; }
        .menu a:hover { background-color: #333; }
        .cart-icon { background-color: #25D366; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; color: black; }

        /* GRADE DE PRODUTOS */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .produto-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .produto-card img { max-width: 100%; border-radius: 5px; }
        .produto-card h3 { font-size: 16px; margin: 10px 0; }
        .preco-destaque { font-size: 20px; font-weight: bold; color: #d9534f; margin-bottom: 10px; }
        .btn-comprar { background-color: #111; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-comprar:hover { background-color: #333; }

        /* CARRINHO LATERAL */
        .carrinho-lateral { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; box-shadow: -2px 0 5px rgba(0,0,0,0.2); transition: 0.3s; z-index: 200; display: flex; flex-direction: column; }
        .carrinho-lateral.aberto { right: 0; }
        .carrinho-header { background: #111; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .fechar-carrinho { cursor: pointer; font-size: 20px; font-weight: bold; }
        .carrinho-itens { flex: 1; overflow-y: auto; padding: 15px; }
        .item-carrinho { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; align-items: center; }
        .carrinho-footer { padding: 15px; background: #f9f9f9; border-top: 1px solid #ddd; }
        .btn-whatsapp { background-color: #25D366; color: white; text-align: center; display: block; padding: 15px; text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 10px; }
        .info-tier { font-size: 12px; color: #555; margin-bottom: 10px; background: #fff3cd; padding: 10px; border-radius: 5px; border: 1px solid #ffeeba;}
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="NEOPODER.SHOP.png" alt="NEOPODER.SHOP">
        </div>
        <nav class="menu">
            <a onclick="filtrar('Todas')">Todas</a>
            <a onclick="filtrar('Camisas de Time')">Camisas de Time</a>
            <a onclick="filtrar('Kits Infantis')">Kits Infantis</a>
            <a onclick="filtrar('Modelos Femininos')">Modelos Femininos</a>
            <a onclick="filtrar('Chuteiras')">Chuteiras</a>
            <a onclick="filtrar('Camisas Retrô')">Camisas Retrô</a>
        </nav>
        <div class="cart-icon" onclick="toggleCarrinho()">
            🛒 Carrinho (<span id="contador-carrinho">0</span>)
        </div>
    </header>

    <div class="container">
        <div class="grid-produtos" id="grid-produtos">
            </div>
    </div>

    <div class="carrinho-lateral" id="carrinho-lateral">
        <div class="carrinho-header">
            <h2>Seu Pedido</h2>
            <span class="fechar-carrinho" onclick="toggleCarrinho()">X</span>
        </div>
        <div class="carrinho-itens" id="carrinho-itens">
            </div>
        <div class="carrinho-footer">
            <div class="info-tier" id="info-tier">
                Modalidade atual: <strong>Calculando...</strong>
            </div>
            <h3>Total: R$ <span id="total-carrinho">0,00</span></h3>
            <a href="#" class="btn-whatsapp" id="btn-whatsapp" onclick="finalizarPedido()">📲 Enviar Pedido via WhatsApp</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
