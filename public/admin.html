<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine - NEOPODER.SHOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans">

    <header class="bg-blue-900 p-4 shadow border-b border-yellow-500 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-yellow-400 tracking-wide">NEOPODER.SHOP</h1>
            <p class="text-[10px] text-gray-300 font-mono">Ambiente de Catálogo Provisório Gratuito</p>
        </div>
        <span class="bg-green-600 text-white text-xs px-3 py-1 rounded-full font-bold animate-pulse">● Online 24h</span>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div class="bg-gray-900 rounded-lg p-4 border border-gray-800 shadow-xl">
            <h2 class="text-lg font-bold text-gray-200 mb-4">Gerenciador de Margens e Categorias</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs text-gray-300">
                    <thead>
                        <tr class="bg-gray-800 text-gray-400 uppercase border-b border-gray-700">
                            <th class="p-3">Nome do Produto</th>
                            <th class="p-3">Categoria</th>
                            <th class="p-3">Custo Fornecedor</th>
                            <th class="p-3">Preço Sugerido (+R$17)</th>
                            <th class="p-3 text-center">Remover</th>
                        </tr>
                    </thead>
                    <tbody id="tabela_corpo" class="divide-y divide-gray-800">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let produtos = [];

        async function carregarTabela() {
            const res = await fetch('/api/dados');
            const dados = await res.json();
            produtos = dados.produtos;
            
            const corpo = document.getElementById('tabela_corpo');
            corpo.innerHTML = '';

            produtos.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-3 font-semibold text-white max-w-xs truncate">${p.nome}</td>
                    <td class="p-3">
                        <input type="text" value="${p.categoria}" onchange="atualizar('${p.id}', 'categoria', this.value)" class="bg-gray-800 border border-gray-700 text-white p-1 rounded w-32 text-xs">
                    </td>
                    <td class="p-3 font-mono text-yellow-400 font-bold">R$ ${p.custo.toFixed(2)}</td>
                    <td class="p-3 font-mono text-green-400 font-bold">R$ ${(p.custo + 17).toFixed(2)}</td>
                    <td class="p-3 text-center">
                        <button onclick="remover('${p.id}')" class="bg-red-700 hover:bg-red-600 text-white px-2 py-1 rounded text-[10px] font-bold">Apagar</button>
                    </td>
                `;
                corpo.appendChild(tr);
            });
        }

        async function atualizar(id, campo, valor) {
            const idx = produtos.findIndex(p => p.id === id);
            if(idx !== -1) {
                produtos[idx][campo] = valor;
                await fetch('/api/salvar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ produtos })
                });
            }
        }

        async function remover(id) {
            if(confirm('Deseja retirar este item do catálogo?')) {
                produtos = produtos.filter(p => p.id !== id);
                await fetch('/api/salvar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ produtos })
                });
                carregarTabela();
            }
        }

        window.onload = carregarTabela;
    </script>
</body>
</html>
